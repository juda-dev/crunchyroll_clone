<div class="page-container" (scroll)="onScroll($event)">
  <div class="page-content">
    <app-header-admin/>
    <app-anime-header [id]="id()" (animeName)="setAnimeName($event)"/>

    <div class="videos-container">
      <app-loading-more-loader />
      <div class="videos-grid">
        @for (video of videos(); track video.id) {
          <app-video-item
            [animeName]="animeName()"
            [video]="video"
            (updateVideo)="editVideo($event)"
            (deleteVideo)="deleteVideo($event)"
          />
        }
      </div>
      <button class="custom-fab" (click)="openVideoModal()">
        <span class="icon">+</span>
        <span class="text">Add New Video</span>
      </button>
    </div>
  </div>
</div>
